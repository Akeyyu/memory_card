<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Idioms Memory Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f1eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    header p {
      font-size: 14px;
      color: #666;
    }

    .scorebar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat {
      background: #fff;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: #888;
      border: 0.5px solid #ddd;
      text-align: center;
      min-width: 90px;
    }

    .stat span {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      display: block;
    }

    .btn {
      background: #fff;
      border: 0.5px solid #ccc;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 13px;
      cursor: pointer;
      color: #1a1a1a;
      transition: background 0.15s;
    }

    .btn:hover { background: #f0ede6; }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 1.2rem;
      font-size: 13px;
      color: #555;
      align-items: center;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      max-width: 800px;
      width: 100%;
    }

    .card {
      aspect-ratio: 1.55 / 1;
      cursor: pointer;
      border-radius: 10px;
      perspective: 700px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.38s ease;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      text-align: center;
    }

    .card-front {
      background: #fff;
      border: 0.5px solid #ccc;
    }

    .card-front-inner {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e8e4dc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #999;
      font-weight: 600;
    }

    .card-back {
      transform: rotateY(180deg);
      border: 0.5px solid;
    }

    .card-back.idiom {
      background: #ddeeff;
      border-color: #378ADD;
    }

    .card-back.definition {
      background: #ddf4ec;
      border-color: #1D9E75;
    }

    .card-back.idiom p {
      color: #0C447C;
      font-weight: 600;
      font-size: 11px;
      line-height: 1.35;
    }

    .card-back.definition p {
      color: #085041;
      font-size: 10px;
      line-height: 1.35;
    }

    .card.matched .card-back.idiom {
      background: #b5d4f4;
      border-color: #185FA5;
    }

    .card.matched .card-back.definition {
      background: #9FE1CB;
      border-color: #0F6E56;
    }

    .card.wrong .card-back {
      border-color: #E24B4A !important;
      background: #fff0f0 !important;
    }

    .card.wrong .card-back p {
      color: #A32D2D !important;
    }



    .win-banner {
      display: none;
      text-align: center;
      padding: 2rem;
      border-radius: 14px;
      border: 0.5px solid #ddd;
      background: #fff;
      margin-top: 1.5rem;
      max-width: 400px;
      width: 100%;
    }

    .win-banner h2 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .win-banner p {
      color: #666;
      font-size: 14px;
      margin-bottom: 1.2rem;
    }

    .win-trophy {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }

    .instructions {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-bottom: 1rem;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
      header h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Travel Idioms Memory Game</h1>
    <p>Match each idiom to its correct definition</p>
  </header>

  <div class="scorebar">
    <div class="stat">Moves <span id="moves">0</span></div>
    <div class="stat">Matched <span id="matched">0 / 12</span></div>
    <button class="btn" onclick="initGame()">&#8635; Restart</button>
  </div>

  <div class="legend">
    <div><span class="legend-dot" style="background:#ddeeff; border: 1px solid #378ADD;"></span>Idiom</div>
    <div><span class="legend-dot" style="background:#ddf4ec; border: 1px solid #1D9E75;"></span>Definition</div>
  </div>

  <p class="instructions">Flip two cards per turn. Match the idiom to its definition!</p>

  <div class="grid" id="grid"></div>

  <div class="win-banner" id="win">
    <span class="win-trophy">&#127942;</span>
    <h2>Well done!</h2>
    <p id="win-msg"></p>
    <button class="btn" onclick="initGame()">Play again</button>
  </div>

  <script>
    const idioms = [
      { idiom: "Hit the road",           def: "To leave or set off on a journey" },
      { idiom: "Catch the red eye",      def: "A flight taken at night" },
      { idiom: "At the crack of dawn",   def: "Very early in the morning" },
      { idiom: "Off the beaten path",    def: "Somewhere unknown or more isolated" },
      { idiom: "Live out of a suitcase", def: "Live somewhere on a temporary basis" },
      { idiom: "On a shoestring",        def: "With a very small amount of money" },
      { idiom: "Travel light",           def: "Travel with minimum luggage" },
      { idiom: "Live it up",             def: "Have an exciting social life" },
      { idiom: "Call it a day",          def: "Agree to stop doing something" },
      { idiom: "Make your way back",     def: "Go back to the place of origin" },
      { idiom: "Get itchy feet",         def: "Have a strong urge to travel" },
      { idiom: "Catch some rays",        def: "To sunbathe or relax in the sun" }
    ];

    let flipped = [], matchedCount = 0, moves = 0, lock = false;

    function initGame() {
      flipped = []; matchedCount = 0; moves = 0; lock = false;
      document.getElementById('moves').textContent = 0;
      document.getElementById('matched').textContent = '0 / 12';
      document.getElementById('win').style.display = 'none';

      const cards = [];
      idioms.forEach((item, i) => {
        cards.push({ id: i, type: 'idiom', text: item.idiom });
        cards.push({ id: i, type: 'definition', text: item.def });
      });
      cards.sort(() => Math.random() - 0.5);

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      cards.forEach((card) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.dataset.id = card.id;
        el.dataset.type = card.type;
        el.innerHTML = `
          <div class="card-inner">
            <div class="card-front">
              <div class="card-front-inner">?</div>
            </div>
            <div class="card-back ${card.type}">
              <p>${card.text}</p>
            </div>
          </div>`;
        el.addEventListener('click', () => flipCard(el));
        grid.appendChild(el);
      });
    }

    function flipCard(el) {
      if (lock || el.classList.contains('flipped') || el.classList.contains('matched')) return;
      el.classList.add('flipped');
      flipped.push(el);

      if (flipped.length === 2) {
        lock = true;
        moves++;
        document.getElementById('moves').textContent = moves;

        const [a, b] = flipped;
        const isMatch = a.dataset.id === b.dataset.id && a.dataset.type !== b.dataset.type;

        if (isMatch) {
          a.classList.add('matched');
          b.classList.add('matched');
          matchedCount++;
          document.getElementById('matched').textContent = matchedCount + ' / 12';
          flipped = [];
          lock = false;

          if (matchedCount === 12) {
            setTimeout(() => {
              document.getElementById('win').style.display = 'block';
              const rating = moves <= 18 ? 'Excellent memory!' : moves <= 26 ? 'Great job!' : 'Keep practising!';
              document.getElementById('win-msg').textContent =
                'You matched all 12 idioms in ' + moves + ' moves. ' + rating;
            }, 500);
          }
        } else {
          a.classList.add('wrong');
          b.classList.add('wrong');

          setTimeout(() => {
            a.classList.remove('flipped', 'wrong');
            b.classList.remove('flipped', 'wrong');
            flipped = [];
            lock = false;
          }, 2000);
        }
      }
    }

    initGame();
  </script>
</body>
</html>
